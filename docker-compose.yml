services:
  db:
    image: postgres:16-alpine
    container_name: customworld-db
    environment:
      POSTGRES_DB: customworld
      POSTGRES_USER: customworld
      POSTGRES_PASSWORD: customworld
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customworld -d customworld"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: customworld-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/customworld
      SPRING_DATASOURCE_USERNAME: customworld
      SPRING_DATASOURCE_PASSWORD: customworld
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      JWT_RESET_TOKEN_EXPIRATION: 1800000
      NOTCHPAY_API_KEY: ""
      NOTCHPAY_PRIVATE_KEY: ""
      NOTCHPAY_API_URL: ""
      SPRING_MAIL_USERNAME: ""
      SPRING_MAIL_PASSWORD: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_PHONE_NUMBER: ""
    ports:
      - "8081:8081"
    volumes:
      - uploads:/app/Uploads
    restart: unless-stopped

volumes:
  postgres-data:
  uploads:
